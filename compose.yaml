services:

  mysql-tienda:
    image: mysql:8.0
    container_name: mysql-tienda
    environment:
      MYSQL_ROOT_PASSWORD: 123456789
      MYSQL_DATABASE: TiendaApp
    ports:
      - "3307:3306"          # 3307 en tu máquina → 3306 en el contenedor
      # (evita conflicto con tu MySQL local en 3306)
    volumes:
      - mysql-tienda-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456789"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - tienda-network

  tienda-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tienda-app
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5050:8080"          # Accedes en http://localhost:5050
    depends_on:
      mysql-tienda:
        condition: service_healthy
    networks:
      - tienda-network

volumes:
  mysql-tienda-data:

networks:
  tienda-network:
    driver: bridge